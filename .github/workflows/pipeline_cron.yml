name: Run Pipeline Every 15 Days

on:
  schedule:
    - cron: '30 18 * * *'   # Every day at midnight IST (18:30 UTC = 12:00 AM IST)
  workflow_dispatch:          # Also allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 390   # hard cap ~6.5 h — prevents infinite hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials from secrets
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Write pipeline state from secret (if provided)
        run: |
          if [ -n "${{ secrets.PIPELINE_STATE }}" ]; then
            echo '${{ secrets.PIPELINE_STATE }}' > pipeline_state.json
          else
            python setup.py
          fi

      - name: Set run date
        run: echo "RUN_DATE=$(TZ='Asia/Kolkata' date +'%d-%m-%Y %H:%M IST')" >> $GITHUB_ENV

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Save updated pipeline state back to secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set PIPELINE_STATE < pipeline_state.json

      - name: Send email notification with result URL
        if: always()   # Send email whether pipeline succeeded or failed
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}, shivang.singh@collegedunia.com, charitra.jain@collegedunia.com, anurag.priyadarshan@collegedunia.com
          from: Collegedunia Pipeline Bot
          subject: "Pipeline Run ${{ job.status == 'success' && '✅ Succeeded' || '❌ Failed' }} — ${{ github.run_id }}"
          body: |
            Pipeline run completed.

            Status   : ${{ job.status }}
            Run date : ${{ env.RUN_DATE }}

            📊 View ranking results in Google Sheet:
            https://docs.google.com/spreadsheets/d/1Fv9C6i3EGAwNQnYUDh1n_pJ0FV-UwfFbhUjkhh3UJD8/edit?usp=sharing
