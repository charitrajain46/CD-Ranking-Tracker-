name: Run Pipeline (Manual Only)

on:
  workflow_dispatch:   # Manual trigger only — no automatic schedule

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 390   # hard cap ~6.5 h — prevents infinite hangs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials from secrets
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      - name: Write pipeline state from secret (if provided)
        run: |
          if [ -n "${{ secrets.PIPELINE_STATE }}" ]; then
            echo '${{ secrets.PIPELINE_STATE }}' > pipeline_state.json
          else
            python setup.py
          fi

      - name: Set run date
        run: echo "RUN_DATE=$(TZ='Asia/Kolkata' date +'%d-%m-%Y %H:%M IST')" >> $GITHUB_ENV

      - name: Run pipeline
        run: python run_pipeline.py

      - name: Save updated pipeline state back to secret
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: gh secret set PIPELINE_STATE < pipeline_state.json

      # Email is sent by run_pipeline.py itself via SMTP — no duplicate here.
